server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Support for React Router (Single Page Application)
    # This tells Nginx to serve index.html for any requested path that doesn't exist as a file.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: configure cache headers for static assets
    location ~* \.(?:css|js|jpg|svg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
